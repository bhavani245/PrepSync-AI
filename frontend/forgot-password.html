<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PREPSYNC — Reset Password</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    .wrap{max-width:520px; margin:0 auto}
  </style>
  <script src="config.js"></script>
</head>
<body>
  <div class="container wrap">
    <header class="header">
      <div class="title">Reset Your Password</div>
    </header>
    <main>
      <div id="alert" class="alert" role="alert" style="display:none"></div>
      <div class="card">
        <div class="list">
          <label class="list-item">
            <div>Registered Email</div>
            <input id="email" class="input" type="email" placeholder="your@email.com" />
          </label>
          <label class="list-item">
            <div>New Password</div>
            <input id="password" class="input" type="password" placeholder="Enter new password" />
          </label>
          <label class="list-item">
            <div>Confirm Password</div>
            <input id="confirm" class="input" type="password" placeholder="Confirm new password" />
          </label>
        </div>
        <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:12px; align-items:center;">
          <a class="btn btn-outline" href="./login.html">Back to Login</a>
          <button id="resetBtn" class="btn">RESET PASSWORD</button>
        </div>
      </div>
    </main>
  </div>

  <nav class="bottom-nav" aria-label="Primary">
    <a class="tab" href="./index.html">HOME</a>
    <a class="tab" href="./history.html">HISTORY</a>
    <a class="tab" href="./settings.html">SETTINGS</a>
  </nav>

  <style>
    .alert {
      background: #2a0b0b;
      color: #ff6b6b;
      border: 1px solid #5b1a1a;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      display: none;
      animation: fadeIn 0.3s ease-in-out;
    }
    .alert.success {
      background: #0b2a14;
      color: #71ff9d;
      border-color: #1a5b2d;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
      20%, 40%, 60%, 80% { transform: translateX(5px); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .password-strength {
      margin-top: 4px;
      font-size: 12px;
      height: 4px;
      border-radius: 2px;
      background: #2d2d2d;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .strength-meter {
      height: 100%;
      width: 0%;
      transition: width 0.3s ease, background 0.3s ease;
    }
  </style>
  <script>
    const alertBox = document.getElementById('alert');
    const resetBtn = document.getElementById('resetBtn');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirm');
    
    let __busy = false;

    // Check if user is already logged in
    function checkAuth() {
      const token = localStorage.getItem('authToken');
      if (token) {
        window.location.href = './index.html';
      }
    }

    // Validate email format
    function isValidEmail(email) {
      const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return re.test(String(email).toLowerCase());
    }

    // Validate password strength
    function isStrongPassword(password) {
      // At least 8 characters, 1 uppercase, 1 lowercase, 1 number, 1 special character
      const hasLength = password.length >= 8;
      const hasUppercase = /[A-Z]/.test(password);
      const hasLowercase = /[a-z]/.test(password);
      const hasNumber = /\d/.test(password);
      const hasSpecial = /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password);
      
      return hasLength && hasUppercase && hasLowercase && hasNumber && hasSpecial;
    }

    // Update password strength meter
    function updatePasswordStrength() {
      const password = passwordInput.value;
      let strength = 0;
      let strengthText = '';
      let strengthClass = '';
      
      // Length check
      if (password.length >= 8) strength += 1;
      // Contains uppercase
      if (/[A-Z]/.test(password)) strength += 1;
      // Contains lowercase
      if (/[a-z]/.test(password)) strength += 1;
      // Contains number
      if (/\d/.test(password)) strength += 1;
      // Contains special character
      if (/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password)) strength += 1;
      
      // Calculate strength percentage and set appropriate class
      const strengthPercent = (strength / 5) * 100;
      
      if (strength <= 1) {
        strengthText = 'Very Weak';
        strengthClass = 'very-weak';
      } else if (strength <= 2) {
        strengthText = 'Weak';
        strengthClass = 'weak';
      } else if (strength <= 3) {
        strengthText = 'Moderate';
        strengthClass = 'moderate';
      } else if (strength <= 4) {
        strengthText = 'Strong';
        strengthClass = 'strong';
      } else {
        strengthText = 'Very Strong';
        strengthClass = 'very-strong';
      }
      
      // Update strength meter
      const strengthMeter = document.querySelector('.strength-meter');
      if (strengthMeter) {
        strengthMeter.style.width = `${strengthPercent}%`;
        strengthMeter.className = `strength-meter ${strengthClass}`;
        
        // Update strength text
        const strengthTextEl = document.querySelector('.strength-text');
        if (strengthTextEl) {
          strengthTextEl.textContent = `Password Strength: ${strengthText}`;
          strengthTextEl.className = `strength-text ${strengthClass}`;
        }
      }
      
      return strength >= 3; // At least moderate strength
    }

    async function doReset() {
      if (__busy) return;
      
      // Get form values
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();
      const confirm = confirmInput.value.trim();
      
      // Reset states
      __busy = true;
      resetBtn.disabled = true;
      alertBox.style.display = 'none';
      
      // Validation
      if (!email || !password || !confirm) {
        showError('All fields are required');
        __busy = false;
        resetBtn.disabled = false;
        return;
      }
      
      if (!isValidEmail(email)) {
        showError('Please enter a valid email address');
        emailInput.focus();
        __busy = false;
        resetBtn.disabled = false;
        return;
      }
      
      if (password !== confirm) {
        showError('Passwords do not match');
        passwordInput.value = '';
        confirmInput.value = '';
        passwordInput.focus();
        __busy = false;
        resetBtn.disabled = false;
        return;
      }
      
      if (!isStrongPassword(password)) {
        showError('Password must be at least 8 characters long and include uppercase, lowercase, number, and special character');
        passwordInput.value = '';
        confirmInput.value = '';
        passwordInput.focus();
        __busy = false;
        resetBtn.disabled = false;
        return;
      }

      try {
        // Show loading state
        resetBtn.textContent = 'Resetting Password...';
        
        // Simulate password reset with localStorage (since backend doesn't have auth endpoints)
        // In a real app, this would call the backend API
        const users = JSON.parse(localStorage.getItem('users') || '[]');
        
        // Check if user exists
        const userIndex = users.findIndex(u => u.email === email);
        if (userIndex === -1) {
          throw new Error('No account found with this email address');
        }
        
        // Update user password
        users[userIndex].password = password;
        localStorage.setItem('users', JSON.stringify(users));
        
        // Show success message
        showSuccess('Password reset successful! Redirecting to login...');
        
        // Clear form
        emailInput.value = '';
        passwordInput.value = '';
        confirmInput.value = '';
        
        // Redirect to login after delay
        setTimeout(() => {
          window.location.href = './login.html';
        }, 1500);
        
      } catch (error) {
        console.error('Password reset error:', error);
        showError(error.message || 'Failed to reset password. Please try again.');
        
        // Focus on the email field if there's an email-related error
        if (error.message && error.message.toLowerCase().includes('email')) {
          emailInput.focus();
        } else {
          passwordInput.focus();
        }
      } finally {
        __busy = false;
        resetBtn.disabled = false;
        resetBtn.textContent = 'RESET PASSWORD';
      }
    }

    function showError(message) {
      alertBox.textContent = message;
      alertBox.style.display = 'block';
      alertBox.className = 'alert';
      alertBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
      
      // Add shake animation
      alertBox.style.animation = 'shake 0.5s';
      setTimeout(() => {
        alertBox.style.animation = '';
      }, 500);
    }

    function showSuccess(message) {
      alertBox.textContent = message;
      alertBox.style.display = 'block';
      alertBox.className = 'alert success';
      alertBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    // Add event listeners
    if (resetBtn) {
      // Click handler
      resetBtn.addEventListener('click', doReset);
      
      // Password strength indicator
      passwordInput.addEventListener('input', updatePasswordStrength);
      
      // Form submission on Enter key
      const formInputs = [emailInput, passwordInput, confirmInput];
      formInputs.forEach((input, index) => {
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            if (index < formInputs.length - 1) {
              formInputs[index + 1].focus();
            } else {
              doReset();
            }
          }
        });
      });
    }
    
    // Add password strength meter to the DOM
    const passwordContainer = passwordInput.parentElement;
    if (passwordContainer) {
      const strengthMeter = `
        <div class="password-strength">
          <div class="strength-meter"></div>
        </div>
        <div class="strength-text">Password Strength: None</div>
      `;
      passwordContainer.insertAdjacentHTML('beforeend', strengthMeter);
    }
    
    // Add styles for password strength meter
    const style = document.createElement('style');
    style.textContent = `
      .strength-meter {
        background: #2d2d2d;
        height: 4px;
        border-radius: 2px;
        transition: width 0.3s ease, background 0.3s ease;
      }
      .very-weak { background: #ff4d4d; width: 20% !important; }
      .weak { background: #ff9a3e; width: 40% !important; }
      .moderate { background: #ffd93e; width: 60% !important; }
      .strong { background: #6bd46b; width: 80% !important; }
      .very-strong { background: #2ecc71; width: 100% !important; }
      .strength-text {
        font-size: 12px;
        margin-top: 4px;
        color: #888;
      }
      .strength-text.very-weak { color: #ff4d4d; }
      .strength-text.weak { color: #ff9a3e; }
      .strength-text.moderate { color: #ffd93e; }
      .strength-text.strong { color: #6bd46b; }
      .strength-text.very-strong { color: #2ecc71; }
    `;
    document.head.appendChild(style);
    
    // Check auth status on page load
    checkAuth();
</script>
</body>
</html>
