<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Prepsync</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    :root{
      --bg-image: url('./assets/image.jpg');
      --card-bg: #000000;
      --card-radius: 12px;
      --white: #ffffff;
      --muted: rgba(255,255,255,0.75);
      --accent: #0a58ca;
      --nav-height: 84px;
      --header-height: 88px;
      --pill-radius: 36px;
    }
    html,body{height:100%;margin:0;font-family:Arial,Helvetica,sans-serif;-webkit-font-smoothing:antialiased;}
    body{
      background-image: var(--bg-image);
      background-size:cover;
      background-position:center;
      background-color:#fff;
      padding: calc(var(--header-height) + 18px) 18px calc(var(--nav-height) + 92px);
      box-sizing:border-box;
      color:#111;
    }

    /* Top header center */
    #site-header{ position:fixed; top:18px; left:50%; transform:translateX(-50%); text-align:center; z-index:50; pointer-events:none; }
    #site-header .title { margin:0; font-weight:700; font-size:28px; color:#000; pointer-events:auto; }
    #site-header .subtitle { margin:6px 0 0 0; color:#000; pointer-events:auto; }

    .center-wrap { display:flex; align-items:flex-start; justify-content:center; flex-direction:column; gap:18px; min-height:calc(100vh - var(--nav-height) - var(--header-height)); margin-bottom: 12px; padding-bottom: 8px; }

    .upcoming { max-width:920px; margin: 0 auto; background: rgba(0,0,0,0.88); color: var(--white); padding:14px 18px; border-radius:12px; box-shadow: 0 6px 18px rgba(0,0,0,0.18); display:flex; flex-direction:column; gap:8px; z-index:10; }
    .upcoming .top { display:flex; justify-content:space-between; align-items:center; gap:12px; }
    .upcoming h3 { margin:0; font-size:16px; color:var(--white); }
    .upcoming .controls { display:flex; gap:8px; align-items:center; }
    .upcoming .controls button { padding:8px 10px; border-radius:8px; border:0; cursor:pointer; background: rgba(255,255,255,0.06); color:var(--white); }
    .upcoming .meta { font-size:12px; color:rgba(255,255,255,0.7); }
    .upcoming ul { margin:0; padding:0 0 0 18px; color:var(--muted); max-height:220px; overflow:auto; }
    .upcoming li { margin:6px 0; }
    .upcoming a { color:var(--white); text-decoration:underline; }

    .card { width:100%; max-width:760px; background: var(--card-bg); border-radius: var(--card-radius); color: var(--white); box-shadow: 0 6px 18px rgba(0,0,0,0.28); padding:20px; box-sizing:border-box; margin: 0 auto calc(var(--nav-height) + 32px); position:relative; z-index:5; }
    .card h2 { margin:0 0 12px 0; color:var(--white); text-align:center; font-size:20px; }
    .notify { background: rgba(255,255,255,0.06); border-radius:8px; padding:10px 12px; margin-bottom:12px; color: var(--white); min-height:38px; display:flex; align-items:center; font-size:14px; }

    label { display:block; margin-top:10px; font-size:13px; color:var(--white); }

    /* Custom searchable dropdown base */
    .custom-select { position:relative; margin-top:6px; }
    .select-trigger {
      width:100%;
      text-align:left;
      padding:10px;
      border-radius:8px;
      background: rgba(255,255,255,0.04);
      color:var(--white);
      border:1px solid rgba(255,255,255,0.12);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      box-sizing:border-box;
    }
    .select-trigger .label { color:var(--muted); font-size:14px; }
    .select-panel {
      position:absolute;
      left:0; right:0;
      margin-top:8px;
      background: #0b0b0b;
      border-radius:10px;
      box-shadow:0 10px 30px rgba(0,0,0,0.6);
      padding:8px;
      z-index:60;
      max-height:260px;
      overflow:hidden;
    }
    .select-panel .search {
      display:block;
      width:100%;
      padding:8px 10px;
      margin-bottom:8px;
      border-radius:8px;
      border:1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      color:var(--white);
      box-sizing:border-box;
    }
    .select-panel ul { list-style:none; margin:0; padding:0; overflow:auto; max-height:180px; }
    .select-panel li { padding:8px 10px; color:var(--white); cursor:pointer; border-radius:6px; }
    .select-panel li:hover, .select-panel li.active { background: rgba(255,255,255,0.03); color:var(--white); }

    /* scrollbar styling */
    .select-panel ul::-webkit-scrollbar { width:8px; }
    .select-panel ul::-webkit-scrollbar-track { background: transparent; }
    .select-panel ul::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius:6px; }
    .select-panel ul { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.08) transparent; }

    .controls { display:flex; gap:12px; margin-top:16px; flex-wrap:wrap; justify-content:center; }
    button { padding:10px 16px; border-radius:8px; border:0; cursor:pointer; font-size:14px; }
    #enterBtn { background: var(--accent); color:white; }
    #resetBtn { background: rgba(255,255,255,0.08); color:var(--white); border:1px solid rgba(255,255,255,0.08); }

    #examList { margin-top:14px; color:var(--muted); }
    #examList a { color:var(--white); text-decoration:underline; }

    .bottom-wrap { position:fixed; left:0; right:0; bottom:16px; height: var(--nav-height); pointer-events:none; z-index:120; display:flex; justify-content:center; align-items:flex-end; }
    .nav-pill { pointer-events:auto; display:flex; align-items:center; justify-content:space-around; width:560px; max-width:92%; height:64px; background: #000000; color: #ffffff; border-radius:40px; box-shadow: 0 12px 30px rgba(8,10,12,0.35); padding:8px 18px; backdrop-filter: blur(6px); }
    .nav-btn { display:flex; flex-direction:column; align-items:center; gap:4px; color:#ffffff; text-decoration:none; font-size:12px; width:120px; text-align:center; }
    .nav-btn svg { width:22px; height:22px; display:block; stroke: #ffffff; }
    .nav-btn.active { color:var(--accent); }
    .nav-btn .dot { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:transparent; transition: all .18s ease; box-shadow:none; }
    .nav-btn.active .dot { background:var(--pill-active-bg); box-shadow: 0 6px 16px rgba(10,88,202,0.28); }

    @media (max-width:480px){ .nav-pill { width:96%; height:60px; padding:6px 12px; } .nav-btn { width:33%; font-size:11px; } .nav-btn .dot { width:34px; height:34px; } }
  </style>
</head>
<body>
  <header id="site-header" aria-hidden="false">
    <div class="title">Prepsync</div>
    <div class="subtitle">path your own way</div>
  </header>

  <div class="center-wrap" role="main">
    <section class="upcoming" id="upcomingBox" aria-live="polite">
      <div class="top">
        <h3>Notification box</h3>
        <div class="controls">
          <div class="meta" id="upcomingMeta">Loading…</div>
          <button id="refreshUpcomingBtn" title="Refresh upcoming exams">Refresh</button>
        </div>
      </div>
      <div id="upcomingContent">Loading upcoming exams...</div>
    </section>

    <div class="card" aria-labelledby="selectHeading">
      <h2 id="selectHeading">Select Exam</h2>

      <div id="selectNotify" class="notify" aria-live="polite">Select Graduation Level, Stream and Sub-Stream then click Enter.</div>

      <label for="levelTrigger">Graduation Level</label>
      <div class="custom-select" id="levelSelect">
        <button type="button" class="select-trigger" id="levelTrigger" aria-haspopup="listbox" aria-expanded="false">
          <span class="label">Select Graduation Level</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="select-panel" id="levelPanel" role="dialog" hidden>
          <input class="search" id="levelSearch" type="text" placeholder="Search levels..." aria-label="Search levels">
          <ul id="levelList" role="listbox" aria-label="Graduation levels"></ul>
        </div>
      </div>
      <input type="hidden" id="level" name="level" value="">

      <label for="streamTrigger">Stream</label>
      <div class="custom-select" id="streamSelect">
        <button type="button" class="select-trigger" id="streamTrigger" aria-haspopup="listbox" aria-expanded="false" aria-disabled="true">
          <span class="label">Select Stream</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="select-panel" id="streamPanel" role="dialog" hidden>
          <input class="search" id="streamSearch" type="text" placeholder="Search streams..." aria-label="Search streams">
          <ul id="streamList" role="listbox" aria-label="Streams"></ul>
        </div>
      </div>
      <input type="hidden" id="stream" name="stream" value="">

      <label for="subTrigger">Sub-Stream</label>
      <div class="custom-select" id="subSelect">
        <button type="button" class="select-trigger" id="subTrigger" aria-haspopup="listbox" aria-expanded="false" aria-disabled="true">
          <span class="label">Select Sub-Stream</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="select-panel" id="subPanel" role="dialog" hidden>
          <input class="search" id="subSearch" type="text" placeholder="Search sub-streams..." aria-label="Search sub-streams">
          <ul id="subList" role="listbox" aria-label="Sub-streams"></ul>
        </div>
      </div>
      <input type="hidden" id="subStream" name="subStream" value="">

      <div class="controls" role="group" aria-label="actions">
        <button id="enterBtn" disabled>Enter</button>
        <button id="resetBtn" type="button">Reset</button>
      </div>

      <div id="examList" aria-live="polite"></div>
    </div>
  </div>
  <div class="bottom-wrap" aria-hidden="false">
    <nav class="nav-pill" role="navigation" aria-label="Bottom navigation">
      <a href="./index.html" class="nav-btn active" id="nav-home">
        <span>Home</span>
      </a>

      <a href="./history.html" class="nav-btn" id="nav-history">
        <span>History</span>
      </a>

      <a href="./settings.html" class="nav-btn" id="nav-settings">
        <span>Settings</span>
      </a>
    </nav>
  </div>


  <script>
    (function(){
      const API_BASE = (window.location.origin === 'file://') ? 'http://localhost:5000/api' : '/api';

      // level elements
      const levelHidden = document.getElementById('level');
      const levelTrigger = document.getElementById('levelTrigger');
      const levelPanel = document.getElementById('levelPanel');
      const levelSearch = document.getElementById('levelSearch');
      const levelList = document.getElementById('levelList');

      // stream elements
      const streamHidden = document.getElementById('stream');
      const streamTrigger = document.getElementById('streamTrigger');
      const streamPanel = document.getElementById('streamPanel');
      const streamSearch = document.getElementById('streamSearch');
      const streamList = document.getElementById('streamList');

      // substream elements
      const subHidden = document.getElementById('subStream');
      const subTrigger = document.getElementById('subTrigger');
      const subPanel = document.getElementById('subPanel');
      const subSearch = document.getElementById('subSearch');
      const subList = document.getElementById('subList');

      const enterBtn = document.getElementById('enterBtn');
      const resetBtn = document.getElementById('resetBtn');
      const selectNotify = document.getElementById('selectNotify');
      const upcomingContent = document.getElementById('upcomingContent');
      const upcomingMeta = document.getElementById('upcomingMeta');
      const refreshBtn = document.getElementById('refreshUpcomingBtn');
      const examListEl = document.getElementById('examList');

      let dropdownData = null;
      let state = { level:'', stream:'', sub:'' };
      let lastFetched = null;

      const FIXED_LEVELS = ['10','12','Diploma','UG','PG'];

      function setSelectNotify(text, isError){
        selectNotify.textContent = text || '';
        selectNotify.style.color = isError ? '#FFD2D2' : '';
      }

      function normalizeId(str){
        if(!str) return '';
        return String(str).toLowerCase().replace(/\s+/g,'_');
      }

      /* Populate list utilities */
      function makeList(container, items, onSelect){
        container.innerHTML = '';
        if(!items || items.length === 0){
          const li = document.createElement('li');
          li.textContent = 'No items';
          li.style.opacity = '0.6';
          li.tabIndex = -1;
          container.appendChild(li);
          return;
        }
        // sort by name
        items = items.slice().sort((a,b)=>{
          const an = (a.name||a).toLowerCase(), bn = (b.name||b).toLowerCase();
          return an.localeCompare(bn);
        });
        items.forEach(it=>{
          const li = document.createElement('li');
          const name = it.name || it;
          const id = it.id || (typeof it === 'string' ? it : name);
          li.textContent = name;
          li.dataset.value = id;
          li.tabIndex = 0;
          li.addEventListener('click', ()=> onSelect(id, name));
          li.addEventListener('keydown', (e)=> {
            if(e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onSelect(id, name); }
          });
          container.appendChild(li);
        });
      }

      function filterList(listEl, q){
        q = (q||'').toLowerCase().trim();
        Array.from(listEl.children).forEach(li=>{
          if(!li.dataset || !li.dataset.value) return;
          const text = li.textContent.toLowerCase();
          li.style.display = text.includes(q) ? '' : 'none';
        });
      }

      /* Level selection */
function populateLevelList(){
  // Prefer backend-provided levels from dropdownData (id,name).
  // Fallback to FIXED_LEVELS if backend data missing.
  let levels = [];
  try {
    if (dropdownData && Array.isArray(dropdownData.levels) && dropdownData.levels.length) {
      // dropdownData.levels expected: [{id, name}, ...]
      levels = dropdownData.levels.map(l => ({ id: l.id || normalizeId(l.name || l), name: l.name || String(l) }));
    } else {
      levels = FIXED_LEVELS.map(item => {
        const label = String(item);
        const formatted = /^[0-9]+$/.test(label) ? label : label.charAt(0).toUpperCase() + label.slice(1).toLowerCase();
        return { id: 'after_' + formatted.toLowerCase().replace(/\s+/g,'_'), name: 'After ' + formatted };
      });
    }
  } catch (e) {
    // defensive fallback
    levels = FIXED_LEVELS.map(item => {
      const label = String(item);
      const formatted = /^[0-9]+$/.test(label) ? label : label.charAt(0).toUpperCase() + label.slice(1).toLowerCase();
      return { id: 'after_' + formatted.toLowerCase().replace(/\s+/g,'_'), name: 'After ' + formatted };
    });
    console.warn('populateLevelList: failed to use dropdownData, using fallback', e);
  }
  makeList(levelList, levels, (id, name)=> selectLevel(id, name));
}
      async function selectLevel(id, name){
        levelHidden.value = name;
        levelTrigger.querySelector('.label').textContent = name;
        state.level = name;
        // reset stream/sub
        streamHidden.value = '';
        streamTrigger.querySelector('.label').textContent = 'Select Stream';
        streamTrigger.setAttribute('aria-disabled','true');
        streamTrigger.setAttribute('disabled','true');
        subHidden.value = '';
        subTrigger.querySelector('.label').textContent = 'Select Sub-Stream';
        subTrigger.setAttribute('aria-disabled','true');
        subTrigger.setAttribute('disabled','true');
        closePanel(levelPanel);
        // load streams for this level from dropdownData or fallback to /api/exams
        await populateStreamsForLevel(id, name);
        updateEnterState();
      }

      /* Streams */
      async function populateStreamsForLevel(levelId, levelName){
        let streams = [];
        if(dropdownData && dropdownData.streams && dropdownData.streams[levelId]){
          streams = dropdownData.streams[levelId];
        } else {
          // fallback: query exams by level and derive streams
          try{
            const q = encodeURIComponent(levelName || '');
            const res = await fetch(API_BASE + '/exams?level=' + q);
            if(res.ok){
              const json = await res.json();
              const exams = json.exams || [];
              const set = new Map();
              exams.forEach(ex=>{
                let s = ex.stream || '';
                if(!s){
                  const m = (ex.category||'').match(/\(([^)]+)\)/);
                  s = m ? m[1].trim() : 'General';
                }
                const sid = normalizeId(s);
                if(!set.has(sid)) set.set(sid, { id: sid, name: s });
              });
              streams = Array.from(set.values());
            }
          }catch(e){
            console.warn('streams fallback failed', e);
          }
        }

        makeList(streamList, streams, (sid, sname)=> selectStream(sid, sname, levelId, levelName));
        const has = streams && streams.length>0;
        if(!has){
          streamTrigger.querySelector('.label').textContent = 'No streams';
          streamTrigger.setAttribute('disabled','true');
          streamTrigger.setAttribute('aria-disabled','true');
        } else {
          streamTrigger.removeAttribute('disabled');
          streamTrigger.setAttribute('aria-disabled','false');
          streamTrigger.querySelector('.label').textContent = 'Select Stream';
        }
      }

      async function selectStream(streamId, streamName, levelId, levelName){
        streamHidden.value = streamName;
        streamTrigger.querySelector('.label').textContent = streamName;
        state.stream = streamName;
        // reset sub
        subHidden.value = '';
        subTrigger.querySelector('.label').textContent = 'Select Sub-Stream';
        subTrigger.setAttribute('aria-disabled','true');
        subTrigger.setAttribute('disabled','true');
        closePanel(streamPanel);
        await populateSubstreamsFor(levelId, streamId, levelName, streamName);
        updateEnterState();
      }

      /* Substreams */
      async function populateSubstreamsFor(levelId, streamId, levelName, streamName){
        const key = `${levelId}||${streamId}`;
        let subs = [];
        if(dropdownData && dropdownData.substreams && dropdownData.substreams[key]){
          subs = dropdownData.substreams[key];
        } else {
          // fallback: query exams for (level, stream) and derive sub-streams (exam names)
          try{
            const params = new URLSearchParams();
            if(levelName) params.set('level', levelName);
            if(streamName) params.set('stream', streamName);
            const res = await fetch(API_BASE + '/exams?' + params.toString());
            if(res.ok){
              const json = await res.json();
              const exams = json.exams || [];
              const set = new Map();
              exams.forEach(ex=>{
                const name = ex.name || ex.title || 'Other';
                const sid = normalizeId(name);
                if(!set.has(sid)) set.set(sid, { id: sid, name });
              });
              subs = Array.from(set.values());
            }
          }catch(e){
            console.warn('substreams fallback failed', e);
          }
        }

        makeList(subList, subs, (sid, sname)=> selectSubstream(sid, sname));
        const has = subs && subs.length>0;
        if(!has){
          subTrigger.querySelector('.label').textContent = 'No sub-streams';
          subTrigger.setAttribute('disabled','true');
          subTrigger.setAttribute('aria-disabled','true');
        } else {
          subTrigger.removeAttribute('disabled');
          subTrigger.setAttribute('aria-disabled','false');
          subTrigger.querySelector('.label').textContent = 'Select Sub-Stream';
        }
      }

      function selectSubstream(id, name){
        subHidden.value = name;
        subTrigger.querySelector('.label').textContent = name;
        state.sub = name;
        closePanel(subPanel);
        updateEnterState();
      }

      /* Panels open/close */
      function openPanel(panel, searchEl){
        panel.hidden = false;
        panel.previousElementSibling && panel.previousElementSibling.setAttribute('aria-expanded','true');
        if(searchEl){ searchEl.value = ''; searchEl.focus(); filterList(panel.querySelector('ul'), ''); }
        document.addEventListener('click', outsideClickHandler);
      }
      function closePanel(panel){
        panel.hidden = true;
        panel.previousElementSibling && panel.previousElementSibling.setAttribute('aria-expanded','false');
        document.removeEventListener('click', outsideClickHandler);
      }
      function outsideClickHandler(e){
        if(!levelPanel.contains(e.target) && !levelTrigger.contains(e.target) &&
           !streamPanel.contains(e.target) && !streamTrigger.contains(e.target) &&
           !subPanel.contains(e.target) && !subTrigger.contains(e.target)) {
          closePanel(levelPanel); closePanel(streamPanel); closePanel(subPanel);
        }
      }

      function updateEnterState(){
        const subExists = subList && Array.from(subList.children).some(li => li.dataset && li.dataset.value);
        enterBtn.disabled = !(state.level && state.stream && (!subExists || state.sub));
      }

      /* Load dropdown-data from backend and initialize lists */
      async function loadDropdowns(){
        try{
          setSelectNotify('Loading options...');
          try{
            const res = await fetch(API_BASE + '/dropdown-data');
            if(res.ok){
              const json = await res.json();
              dropdownData = json.data || json;
            }
          }catch(e){
            console.warn('dropdown-data fetch failed, using fallback');
          }
          populateLevelList();
          // initially disable stream/sub
          streamTrigger.setAttribute('aria-disabled','true'); streamTrigger.setAttribute('disabled','true');
          subTrigger.setAttribute('aria-disabled','true'); subTrigger.setAttribute('disabled','true');
          setSelectNotify('Options loaded.');
        }catch(err){
          console.error(err);
          setSelectNotify('Failed to load options. See console.', true);
        } finally { updateEnterState(); }
      }

      /* Upcoming exams */
      async function loadUpcoming(){
        try{
          refreshBtn.disabled = true;
          upcomingContent.textContent = 'Loading upcoming exams...';
          upcomingMeta.textContent = 'Refreshing…';
          const res = await fetch(API_BASE + '/exams');
          if(!res.ok) throw new Error('Network ' + res.status);
          const payload = await res.json();
          const exams = payload.exams || [];
          lastFetched = new Date();
          if(exams.length === 0){
            upcomingContent.innerHTML = '<div>No upcoming exams found.</div>';
            upcomingMeta.textContent = `Last updated: ${lastFetched.toLocaleString()}`;
            refreshBtn.disabled = false;
            return;
          }
          const list = exams.slice(0, 50).map(e => {
            const name = e.name || e.title || 'Exam';
            const slug = e.slug || '';
            const q = slug ? `exam-details.html?slug=${encodeURIComponent(slug)}` : `exam-details.html?id=${encodeURIComponent(e.id)}`;
            return `<li><a href="${q}">${escapeHtml(name)}</a></li>`;
          });
          upcomingContent.innerHTML = `<ul>${list.join('')}</ul>`;
          upcomingMeta.textContent = `Last updated: ${lastFetched.toLocaleString()} — ${exams.length} results`;
        }catch(err){
          console.error(err);
          upcomingContent.innerHTML = '<div>Failed to load upcoming exams.</div>';
          upcomingMeta.textContent = 'Update failed';
        } finally {
          refreshBtn.disabled = false;
        }
      }

      function escapeHtml(s){
        if(!s) return '';
        return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
      }

      /* Wire events */
      levelTrigger.addEventListener('click', ()=> { if(levelPanel.hidden) openPanel(levelPanel, levelSearch); else closePanel(levelPanel); });
      levelSearch.addEventListener('input', (e)=> filterList(levelList, e.target.value));

      streamTrigger.addEventListener('click', ()=> { if(streamTrigger.getAttribute('aria-disabled') === 'true') return; if(streamPanel.hidden) openPanel(streamPanel, streamSearch); else closePanel(streamPanel); });
      streamSearch.addEventListener('input', (e)=> filterList(streamList, e.target.value));

      subTrigger.addEventListener('click', ()=> { if(subTrigger.getAttribute('aria-disabled') === 'true') return; if(subPanel.hidden) openPanel(subPanel, subSearch); else closePanel(subPanel); });
      subSearch.addEventListener('input', (e)=> filterList(subList, e.target.value));

      enterBtn.addEventListener('click', ()=> {
        if(!state.level){ setSelectNotify('Select Graduation Level', true); return; }
        if(!state.stream){ setSelectNotify('Select Stream', true); return; }
        const subExists = subList && Array.from(subList.children).some(li => li.dataset && li.dataset.value);
        if(subExists && !state.sub){ setSelectNotify('Select Sub-Stream', true); return; }
        const params = new URLSearchParams();
        params.set('level', state.level);
        params.set('stream', state.stream);
        if(state.sub) params.set('subStream', state.sub);
        window.location.href = `exam-details.html?${params.toString()}`;
      });

      resetBtn.addEventListener('click', ()=> {
        state = { level:'', stream:'', sub:'' };
        levelHidden.value = '';
        levelTrigger.querySelector('.label').textContent = 'Select Graduation Level';
        streamHidden.value = '';
        streamTrigger.querySelector('.label').textContent = 'Select Stream';
        subHidden.value = '';
        subTrigger.querySelector('.label').textContent = 'Select Sub-Stream';
        populateLevelList();
        streamList.innerHTML = ''; subList.innerHTML = '';
        streamTrigger.setAttribute('aria-disabled','true'); streamTrigger.setAttribute('disabled','true');
        subTrigger.setAttribute('aria-disabled','true'); subTrigger.setAttribute('disabled','true');
        updateEnterState();
      });

      refreshBtn.addEventListener('click', loadUpcoming);

      document.querySelectorAll('.nav-btn').forEach(btn=>{ btn.classList.remove('active'); });
      const me = document.getElementById('nav-home'); if(me) me.classList.add('active');

      // init
      loadDropdowns();
      loadUpcoming();

    })();
  </script>
</body>
</html>
