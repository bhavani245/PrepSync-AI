<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PREPSYNC — History</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    /* Bottom Navigation - Modern Dark Theme */
    .bottom-nav {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      border-radius: 30px;
      padding: 5px;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .nav-container {
      display: flex;
      gap: 5px;
      padding: 4px;
    }
    
    .tab {
      color: #ffffff;
      text-decoration: none;
      padding: 10px 24px;
      font-weight: 500;
      border-radius: 20px;
      transition: all 0.3s ease;
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 0.5px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      white-space: nowrap;
    }
    
    .tab:not(.active):hover {
      background: rgba(255, 255, 255, 0.1);
    }
    
    .tab.active {
      background: #b0b0b0;
      color: #000000;
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }
    
    @media (max-width: 480px) {
      .bottom-nav {
        width: calc(100% - 40px);
        bottom: 10px;
      }
      
      .tab {
        padding: 8px 16px;
        font-size: 0.75rem;
        flex: 1;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="title title--black">HISTORY</div>
    </header>

    <main>
      <div class="page-head">
        <div class="subtitle subtitle--black">Tracking Syllabus</div>
      </div>

      <div class="card">
        <div id="historyList" class="list"></div>
      </div>
    </main>
  </div>

  <nav class="bottom-nav" aria-label="Primary">
    <div class="nav-container">
      <a class="tab" href="./index.html">HOME</a>
      <a class="tab active" href="./history.html">HISTORY</a>
      <a class="tab" href="./settings.html">SETTINGS</a>
    </div>
  </nav>

  <script>
    // Load tracked exams from localStorage
    function loadHistory(){
      const el = document.getElementById('historyList');
      el.innerHTML = '<div class="helper">Loading...</div>';
      
      try{
        const trackedExams = JSON.parse(localStorage.getItem('trackedExams') || '[]');
        
        if(!trackedExams.length){ 
          el.innerHTML = '<div class="helper">No tracked exams yet. Start tracking exams from the syllabus page!</div>'; 
          return; 
        }
        
        el.innerHTML = trackedExams.map(exam => `
          <div class='list-item'>
            <div>
              <div class='item-title'>${exam.name}</div>
              <div class='item-sub'>${exam.category || '—'} • ${exam.level || '—'}</div>
              <div class='item-sub'>Tracked on: ${new Date(exam.trackedAt).toLocaleDateString()}</div>
            </div>
            <div style="display: flex; gap: 8px;">
              <a class='btn btn-outline' href='./exam-syllabus.html?slug=${encodeURIComponent(exam.slug)}&name=${encodeURIComponent(exam.name)}'>View</a>
              <button class='btn btn-danger' onclick='removeExam("${exam.id}")'>Remove</button>
            </div>
          </div>
        `).join('');
      }catch(err){
        console.error('Error loading history:', err);
        el.innerHTML = '<div class="helper">Failed to load history.</div>';
      }
    }
    
    // Remove exam from tracked list
    function removeExam(examId) {
      try {
        const trackedExams = JSON.parse(localStorage.getItem('trackedExams') || '[]');
        const updatedExams = trackedExams.filter(exam => exam.id !== examId);
        localStorage.setItem('trackedExams', JSON.stringify(updatedExams));
        
        // Reload the history
        loadHistory();
        
        alert('Exam removed from history');
      } catch (err) {
        console.error('Error removing exam:', err);
        alert('Failed to remove exam');
      }
    }
    
    window.addEventListener('DOMContentLoaded', loadHistory);
  </script>
</body>
</html>
