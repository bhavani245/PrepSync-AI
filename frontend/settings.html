<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PREPSYNC — Settings</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    /* Bottom Navigation - Modern Dark Theme */
    .bottom-nav {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      border-radius: 30px;
      padding: 5px;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .nav-container {
      display: flex;
      gap: 5px;
      padding: 4px;
    }
    
    .tab {
      color: #ffffff;
      text-decoration: none;
      padding: 10px 24px;
      font-weight: 500;
      border-radius: 20px;
      transition: all 0.3s ease;
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 0.5px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      white-space: nowrap;
    }
    
    .tab:not(.active):hover {
      background: rgba(255, 255, 255, 0.1);
    }
    
    .tab.active {
      background: #b0b0b0;
      color: #000000;
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }
    
    @media (max-width: 480px) {
      .bottom-nav {
        width: calc(100% - 40px);
        bottom: 10px;
      }
      
      .tab {
        padding: 8px 16px;
        font-size: 0.75rem;
        flex: 1;
        text-align: center;
      }
    }
    
    /* Ensure content doesn't hide behind the bottom nav */
    .container {
      padding-bottom: 100px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="title title--black">SETTINGS</div>
    </header>

    <main>
      <div class="page-head">
        <div class="subtitle subtitle--black">Profile</div>
      </div>

      <div class="card">
        <div class="list">
          <div class="list-item"><div>Username</div><div id="username">—</div></div>
          <div class="list-item"><div>Email</div><div id="email">—</div></div>
        </div>
        <div style="display:flex; gap:8px; margin-top:12px;">
          <a class="btn" href="./edit-profile.html">Edit Profile</a>
        </div>
      </div>

      <div style="height:16px"></div>

      <div class="card" style="display:flex; justify-content:flex-end">
        <button id="logoutBtn" class="btn btn-outline">Logout</button>
      </div>
    </main>
  </div>

  <nav class="bottom-nav" aria-label="Primary">
    <div class="nav-container">
      <a class="tab" href="./index.html">HOME</a>
      <a class="tab" href="./history.html">HISTORY</a>
      <a class="tab active" href="./settings.html">SETTINGS</a>
    </div>
  </nav>

  <div id="modal" class="modal-backdrop">
    <div class="modal">
      <div style="font-weight:800; margin-bottom:6px">Do you want to logout? Are you sure?</div>
      <div class="modal-actions">
        <button id="noBtn" class="btn btn-outline">NO</button>
        <button id="yesBtn" class="btn">YES</button>
      </div>
    </div>
  </div>

  <script>
    // Load user profile from localStorage
    function load(){
      try{
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        document.getElementById('username').textContent = user.username || 'Guest';
        document.getElementById('email').textContent = user.email || 'guest@example.com';
      }catch(err){
        console.error('Error loading profile:', err);
        document.getElementById('username').textContent = 'Guest';
        document.getElementById('email').textContent = 'guest@example.com';
      }
    }

    // Logout functionality
    function logout() {
      // Clear localStorage
      localStorage.removeItem('authToken');
      localStorage.removeItem('user');
      
      // Redirect to login
      window.location.href = './login.html';
    }

    const modal = document.getElementById('modal');
    document.getElementById('logoutBtn').addEventListener('click', ()=>{ modal.style.display='flex'; });
    document.getElementById('noBtn').addEventListener('click', ()=>{ modal.style.display='none'; });
    document.getElementById('yesBtn').addEventListener('click', ()=>{ 
      modal.style.display='none'; 
      logout(); 
    });

    window.addEventListener('DOMContentLoaded', load);
  </script>
</body>
</html>
